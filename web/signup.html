<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - DTM Test Platform</title>
    <meta name="description" content="DTM Test Platform ga ro'yxatdan o'ting">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/" class="logo">
                    <img src="/logo.svg" alt="DTM Test" class="logo-img">
                    <span class="logo-text">DTM Test</span>
                </a>
                <h2>Ro'yxatdan o'tish</h2>
                <p>Yangi hisob yaratish uchun ma'lumotlaringizni kiriting</p>
            </div>

            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="name">To'liq ism</label>
                    <input type="text" id="name" name="name" placeholder="Ism Familiyangiz" required>
                </div>
                <div class="form-group">
                    <label for="email">Email manzili</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Parol</label>
                    <input type="password" id="password" name="password" placeholder="Kamida 6 ta belgi" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Parolni tasdiqlash</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                        placeholder="Parolingizni qayta kiriting" required>
                </div>
                <button type="submit" class="btn-primary btn-full">
                    <img src="/icon-target.svg" alt="" class="btn-icon">
                    Ro'yxatdan o'tish
                </button>
            </form>

            <div class="auth-divider">
                <span>yoki</span>
            </div>
            <div id="googleSignupButton" style="display:flex;justify-content:center;margin-bottom:16px;"></div>

            <div class="auth-footer">
                <p>Allaqachon hisobingiz bormi? <a href="/login.html">Kirish</a></p>
            </div>

            <div class="auth-links">
                <a href="/" class="back-link">
                    <span>←</span>
                    Bosh sahifaga qaytish
                </a>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
