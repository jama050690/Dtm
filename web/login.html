<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - DTM Test Platform</title>
    <meta name="description" content="DTM Test Platform ga kirish">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/" class="logo">
                    <img src="/logo.svg" alt="DTM Test" class="logo-img">
                    <span class="logo-text">DTM Test</span>
                </a>
                <h2>Xush kelibsiz!</h2>
                <p>Hisobingizga kirish uchun ma'lumotlaringizni kiriting</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email manzili</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Parol</label>
                    <input type="password" id="password" name="password" placeholder="Parolingizni kiriting" required>
                </div>
                <button type="submit" class="btn-primary btn-full">
                    <img src="/icon-security.svg" alt="" class="btn-icon">
                    Kirish
                </button>
            </form>

            <div class="auth-divider">
                <span>yoki</span>
            </div>
            <div id="googleLoginButton" style="display:flex;justify-content:center;margin-bottom:16px;"></div>

            <div class="auth-footer">
                <p>Hisobingiz yo'qmi? <a href="/signup.html">Ro'yxatdan o'tish</a></p>
            </div>

            <div class="auth-links">
                <a href="/" class="back-link">
                    <span>←</span>
                    Bosh sahifaga qaytish
                </a>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
